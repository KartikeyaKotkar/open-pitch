<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenPitch</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 240px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f0f0f;
            color: #f1f1f1;
        }

        h1 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: 0.02em;
            color: #fff;
        }

        .pitch-display {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ff4e4e;
            letter-spacing: -0.5px;
        }

        .pitch-display span {
            font-size: 13px;
            font-weight: 400;
            color: #aaa;
            margin-left: 4px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #333;
            outline: none;
            margin-bottom: 8px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff4e4e;
            cursor: pointer;
        }

        .labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
            margin-bottom: 14px;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #222;
            color: #aaa;
            border: 1px solid #333;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover {
            background: #2a2a2a;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>OpenPitch</h1>

    <div class="pitch-display">
        <span id="display">0</span><span>st</span>
    </div>

    <div
        style="font-size: 11px; font-weight: 500; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;">
        Semitones</div>
    <input type="range" id="pitch" min="-12" max="12" step="0.5" value="0" />
    <div class="labels">
        <span>-12st</span>
        <span>0</span>
        <span>+12st</span>
    </div>

    <div
        style="font-size: 11px; font-weight: 500; color: #666; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;">
        Fine Tuning (cents)</div>
    <input type="range" id="pitchCents" min="-100" max="100" step="1" value="0" />
    <div class="labels">
        <span>-100c</span>
        <span>0</span>
        <span>+100c</span>
    </div>

    <button id="reset">Reset to 0</button>

    <script src="popup.js"></script>
</body>

</html>
